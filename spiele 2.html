    <div class="content">
        <div id="start-screen" class="start-screen">
            <h2>Los geht's!</h2>
            <div class="age-selector">

<script>
    const questions = {
        11: [
            {q: "Wie viele Beine hat eine Spinne?", hints: ["Spinnen sind keine Insekten", "Es sind mehr als 6 Beine", "Denk an die Zahl 8"], options: ["6 Beine", "8 Beine", "10 Beine", "12 Beine"], correct: 1, sachlich: "Spinnen gehören zu den Spinnentieren und haben immer 8 Beine. Insekten haben nur 6 Beine. Spinnen nutzen ihre 8 Beine zum Laufen, Klettern und zum Festhalten ihrer Beute. Jedes Bein hat mehrere Gelenke und kleine Härchen, mit denen Spinnen sogar an glatten Wänden hochklettern können.", anekdotisch: "Spinnen sind richtig coole Tiere! Mit ihren 8 Beinen können sie super schnell rennen - manche Spinnen sind so schnell wie ein Auto in der Tempo-30-Zone! Stell dir vor, du hättest auch 8 Beine - du könntest gleichzeitig laufen, klettern und dich festhalten. Spinnen nutzen ihre vielen Beine auch, um ganz feine Netze zu spinnen. Wenn eine Spinne ein Bein verliert, kann sie sogar nachwachsen lassen! Das ist wie eine Superkraft. Viele Leute haben Angst vor Spinnen, aber die meisten Spinnen sind total harmlos und helfen uns sogar, indem sie lästige Mücken und Fliegen fangen."},
            
            {q: "Welcher Planet ist der Sonne am nächsten?", hints: ["Er ist der kleinste Planet", "Sein Name kommt vom römischen Götterboten", "Er hat keine Monde"], options: ["Venus", "Merkur", "Mars", "Erde"], correct: 1, sachlich: "Merkur ist der sonnennächste Planet. Er ist nur etwa 58 Millionen Kilometer von der Sonne entfernt. Merkur ist sehr klein - etwa so groß wie unser Mond. Auf Merkur ist es tagsüber über 400 Grad heiß, nachts aber eisig kalt. Ein Jahr auf Merkur dauert nur 88 Erdentage.", anekdotisch: "Merkur ist echt ein verrückter Planet! Stell dir vor: Tagsüber könnte man dort Blei schmelzen, weil es so heiß ist - über 400 Grad! Nachts wird es dann eiskalt, minus 170 Grad. Das ist wie ein riesiger Backofen, der plötzlich zur Gefriertruhe wird. Merkur rast so schnell um die Sonne, dass ein ganzes Jahr dort nur 88 Tage dauert - da hättest du viel öfter Geburtstag! Der Planet hat seinen Namen vom römischen Gott Merkur, der super schnell laufen konnte."},

            {q: "Was passiert mit Wasser bei 0 Grad Celsius?", hints: ["Denk an Eiswürfel", "Wasser verändert seine Form", "Es wird fest"], options: ["Es wird zu Dampf", "Es gefriert zu Eis", "Es verschwindet", "Es wird heiß"], correct: 1, sachlich: "Bei 0 Grad Celsius gefriert Wasser und wird zu Eis. Die Wassermoleküle ordnen sich in einer festen Struktur an. Interessant: Eis nimmt mehr Platz ein als flüssiges Wasser - deshalb schwimmt Eis auf Wasser. Dieser Vorgang heißt 'Gefrieren' und ist umkehrbar.", anekdotisch: "Hast du schon mal eine Wasserflasche im Gefrierschrank vergessen? Dann weißt du, was passiert: Das Wasser wird zu Eis und die Flasche kann sogar platzen! Das liegt daran, dass Eis mehr Platz braucht als Wasser. Deshalb schwimmen auch Eisberge auf dem Meer - sie sind leichter! Im Winter werden Pfützen zu Eis, und wenn du morgens aufwachst, sind die Fenster manchmal mit Eisblumen bedeckt."},

            {q: "Wie heißt der größte Ozean der Welt?", hints: ["Er liegt zwischen Amerika und Asien", "Sein Name bedeutet 'friedlich'", "Er ist größer als der Atlantik"], options: ["Atlantischer Ozean", "Indischer Ozean", "Pazifischer Ozean", "Arktischer Ozean"], correct: 2, sachlich: "Der Pazifische Ozean ist der größte Ozean der Erde. Er bedeckt etwa ein Drittel der gesamten Erdoberfläche. Der Pazifik ist größer als alle Kontinente zusammen. Der Name 'Pazifik' kommt vom lateinischen Wort für 'friedlich', obwohl dort oft Stürme toben.", anekdotisch: "Der Pazifik ist sooo riesig! Wenn du mit dem Flugzeug von Amerika nach Japan fliegst, siehst du stundenlang nur Wasser. Der Ozean ist so groß, dass alle Kontinente der Erde dort hineinpassen würden! Im Pazifik gibt es die tiefste Stelle der ganzen Welt - den Marianengraben. Der ist fast 11 Kilometer tief! Würde man den Mount Everest, den höchsten Berg, dort hineinstellen, wäre er komplett unter Wasser!"},

            {q: "Wie viele Zähne hat ein erwachsener Mensch normalerweise?", hints: ["Es sind mehr als 20", "Zähle auch die Weisheitszähne mit", "Die Zahl liegt bei 32"], options: ["28 Zähne", "30 Zähne", "32 Zähne", "36 Zähne"], correct: 2, sachlich: "Ein erwachsener Mensch hat normalerweise 32 Zähne, inklusive der 4 Weisheitszähne. Als Kind hat man nur 20 Milchzähne. Die bleibenden Zähne kommen nach und nach. Manchmal wachsen Weisheitszähne nicht richtig oder gar nicht, dann hat man nur 28 Zähne.", anekdotisch: "32 Zähne - das ist ganz schön viel! Wenn du noch nicht alle hast, liegt das daran, dass manche erst später wachsen. Die Weisheitszähne kommen oft erst, wenn man schon fast erwachsen ist - deshalb heißen sie auch 'Weisheitszähne'! Früher brauchten Menschen mehr Zähne, weil das Essen härter war. Heute passen die Weisheitszähne manchmal gar nicht mehr in den Mund und müssen rausgezogen werden. Deshalb ist Zähneputzen so wichtig - damit alle Zähne gesund bleiben!"},

            {q: "Welches Organ pumpt Blut durch deinen Körper?", hints: ["Es schlägt etwa 70 Mal pro Minute", "Es sitzt in deiner Brust", "Wenn du rennst, schlägt es schneller"], options: ["Die Lunge", "Das Herz", "Die Leber", "Der Magen"], correct: 1, sachlich: "Das Herz ist ein Muskel, der Blut durch den ganzen Körper pumpt. Es schlägt etwa 70 Mal pro Minute, das sind über 100.000 Mal am Tag! Das Herz hat vier Kammern und arbeitet wie eine Pumpe. Es pumpt sauerstoffreiches Blut zu allen Organen und Muskeln.", anekdotisch: "Dein Herz ist ein echter Superkämpfer! Es arbeitet dein ganzes Leben lang, ohne je Pause zu machen - sogar wenn du schläfst! Wenn du Sport machst oder dich aufregst, schlägt es schneller, um mehr Blut zu pumpen. Du kannst deinen Herzschlag fühlen, wenn du deine Hand auf die Brust legst oder deinen Puls am Handgelenk misst. Dein Herz ist etwa so groß wie deine Faust und pumpt jeden Tag genug Blut, um eine Badewanne zu füllen!"},

            {q: "Wie nennt man ein junges Pferd?", hints: ["Es kann schon kurz nach der Geburt stehen", "Es trinkt Milch von seiner Mutter", "Das Wort fängt mit F an"], options: ["Kalb", "Lamm", "Fohlen", "Ferkel"], correct: 2, sachlich: "Ein junges Pferd heißt Fohlen. Fohlen können schon wenige Stunden nach der Geburt stehen und laufen. Sie trinken zuerst Muttermilch und fressen später Gras und Heu. Mit etwa drei Jahren sind Pferde ausgewachsen.", anekdotisch: "Hast du schon mal ein Fohlen gesehen? Die sind total süß und haben ganz lange, wackelige Beine! Das Verrückte ist: Schon kurz nach der Geburt können sie aufstehen und laufen - das schaffst du als Baby ja nicht! Fohlen spielen gerne mit anderen Fohlen, rennen über die Wiese und hüpfen herum. Sie bleiben ganz eng bei ihrer Mama und trinken ihre Milch. Nach einem Jahr sind sie schon fast so groß wie ein erwachsenes Pferd!"},

            {q: "Was ist 7 × 8?", hints: ["Es ist größer als 50", "Die Zahl liegt zwischen 50 und 60", "Es sind genau 56"], options: ["48", "54", "56", "64"], correct: 2, sachlich: "7 × 8 = 56. Das ist das kleine Einmaleins. Man kann es auch als 7 + 7 + 7 + 7 + 7 + 7 + 7 + 7 rechnen, also achtmal die Zahl 7 addieren. Oder: 8 + 8 + 8 + 8 + 8 + 8 + 8, also siebenmal die Zahl 8.", anekdotisch: "Die Malaufgabe 7 × 8 ist für viele Kinder eine der kniffligsten! Ein guter Trick: 7 × 8 ist das Gleiche wie 7 × 10 minus 7 × 2, also 70 - 14 = 56. Oder denk so: 7 × 8 ist wie eine Woche (7 Tage) mal 8, das sind 56 Tage - fast zwei Monate! Wenn du das kleine Einmaleins gut kannst, wird Mathe viel einfacher!"},

            {q: "In welchem Land steht der Eiffelturm?", hints: ["Das Land liegt in Europa", "Die Hauptstadt ist Paris", "Dort spricht man Französisch"], options: ["Italien", "Spanien", "Deutschland", "Frankreich"], correct: 3, sachlich: "Der Eiffelturm steht in Frankreich, genauer in der Hauptstadt Paris. Er wurde 1889 gebaut und ist 324 Meter hoch. Der Turm ist aus Eisen und wiegt über 10.000 Tonnen. Er ist eines der bekanntesten Wahrzeichen der Welt.", anekdotisch: "Der Eiffelturm ist riesig! Wenn du oben stehst, kannst du ganz Paris sehen. Er wurde für eine Weltausstellung gebaut und sollte eigentlich nach 20 Jahren wieder abgerissen werden - zum Glück ist das nicht passiert! Nachts leuchtet der Turm wunderschön mit tausenden Lichtern. Jeden Tag besuchen ihn über 20.000 Menschen! Wenn es heiß ist, wird der Turm durch die Hitze sogar 15 Zentimeter höher!"},

            {q: "Wie viele Bundesländer hat Deutschland?", hints: ["Es sind mehr als 10", "Die Zahl ist zwischen 15 und 18", "Bayern und Berlin zählen dazu"], options: ["12", "14", "16", "18"], correct: 2, sachlich: "Deutschland hat 16 Bundesländer. Die drei größten sind Bayern, Niedersachsen und Baden-Württemberg. Die drei Stadtstaaten sind Berlin, Hamburg und Bremen. Jedes Bundesland hat eine eigene Landesregierung und Hauptstadt.", anekdotisch: "Deutschland besteht aus 16 Bundesländern - das sind wie 16 große Puzzle-Teile! Manche sind riesig wie Bayern (dort gibt es die Alpen!), andere sind winzig wie Bremen. Berlin, Hamburg und Bremen sind ganz besondere Bundesländer, weil sie nur aus einer Stadt bestehen - das nennt man Stadtstaat. Jedes Bundesland hat eigene Regeln, zum Beispiel wann die Ferien sind. Deshalb haben nicht alle Kinder in Deutschland zur gleichen Zeit Sommerferien!"},

            {q: "Was brauchen Pflanzen zum Wachsen?", hints: ["Sie brauchen drei Dinge", "Licht ist sehr wichtig", "Denk auch an Flüssigkeit"], options: ["Nur Erde", "Licht, Wasser und Luft", "Nur Wärme", "Nur Wasser"], correct: 1, sachlich: "Pflanzen brauchen Licht, Wasser und Luft (Kohlendioxid) zum Wachsen. Mit Hilfe von Sonnenlicht machen sie aus Kohlendioxid und Wasser Zucker - das nennt man Fotosynthese. Dabei entsteht auch Sauerstoff, den wir Menschen zum Atmen brauchen.", anekdotisch: "Pflanzen sind wie kleine Fabriken! Sie nehmen Sonnenlicht, Wasser aus der Erde und Luft auf und machen daraus ihr eigenes Essen - den Zucker. Das ist wie Zauberei! Als Abfallprodukt produzieren sie Sauerstoff, den wir zum Atmen brauchen. Ohne Pflanzen könnten wir gar nicht leben! Wenn du eine Pflanze im Dunkeln lässt, wird sie gelb und geht kaputt. Aber mit Licht, Wasser und frischer Luft wächst sie groß und stark!"},

            {q: "Wie viele Minuten hat eine Stunde?", hints: ["Es sind mehr als 50", "Die Zahl ist durch 10 teilbar", "Sechs mal 10 Minuten"], options: ["50 Minuten", "55 Minuten", "60 Minuten", "70 Minuten"], correct: 2, sachlich: "Eine Stunde hat 60 Minuten. Eine Minute hat wiederum 60 Sekunden. Ein Tag hat 24 Stunden. Das Zeitsystem mit 60 kommt aus dem alten Babylon und wird auf der ganzen Welt genutzt.", anekdotisch: "60 Minuten - das ist eine ganze Stunde! Wenn du auf die Uhr schaust, macht der große Zeiger eine komplette Runde, dann ist eine Stunde rum. In 60 Minuten kannst du eine Menge machen: einen Film schauen, Fußball spielen, oder zur Schule gehen. Die Schulstunde dauert oft 45 Minuten, also etwas weniger als eine echte Stunde. Wenn der Minutenzeiger auf der 12 steht und der Stundenzeiger auf der 3, ist es genau 3 Uhr!"},

            {q: "Welches Tier ist das schnellste Landtier?", hints: ["Es lebt in Afrika", "Es hat Punkte auf dem Fell", "Es kann über 100 km/h schnell laufen"], options: ["Löwe", "Gepard", "Pferd", "Tiger"], correct: 1, sachlich: "Der Gepard ist das schnellste Landtier der Welt. Er kann bis zu 120 km/h schnell rennen! Allerdings nur für kurze Strecken von etwa 400-500 Metern. Geparden haben lange, schlanke Beine und einen flexiblen Rücken, der ihnen beim Sprinten hilft.", anekdotisch: "Geparden sind die Formel-1-Rennwagen der Tierwelt! Sie können in nur 3 Sekunden von 0 auf 100 km/h beschleunigen - schneller als die meisten Autos! Wenn ein Gepard rennt, sind alle vier Pfoten manchmal gleichzeitig in der Luft. Er jagt Gazellen und andere schnelle Tiere. Nach so einem Sprint ist der Gepard total erschöpft und muss erst mal verschnaufen. Seine Punkte helfen ihm, sich im hohen Gras zu verstecken!"},

            {q: "Wie nennt man die Zeit, in der Dinosaurier lebten?", hints: ["Es war vor sehr langer Zeit", "Die Zeit endete vor 65 Millionen Jahren", "Ein bekannter Film heißt '... Park'"], options: ["Steinzeit", "Eiszeit", "Jurazeit/Erdzeitalter", "Bronzezeit"], correct: 2, sachlich: "Dinosaurier lebten im Erdmittelalter, auch Mesozoikum genannt. Diese Zeit wird in drei Abschnitte unterteilt: Trias, Jura und Kreidezeit. Die bekannteste ist die Jurazeit. Dinosaurier herrschten über 160 Millionen Jahre auf der Erde, bevor sie vor 65 Millionen Jahren ausstarben.", anekdotisch: "Dinosaurier lebten unglaublich lange auf der Erde - viel länger als wir Menschen! Es gab riesige Pflanzenfresser wie den Brachiosaurus, der so groß wie ein Haus war, und gefährliche Fleischfresser wie den T-Rex mit seinen gewaltigen Zähnen. Die Welt sah damals ganz anders aus: es war viel wärmer, und es gab riesige Farne und Urwald. Vor 65 Millionen Jahren schlug ein riesiger Meteorit auf der Erde ein und die Dinosaurier starben aus. Nur die Vögel, die von Dinosauriern abstammen, haben überlebt!"},

            {q: "Was bedeutet das Verkehrszeichen mit rotem Rand und weißem Dreieck mit Ausrufezeichen?", hints: ["Es warnt vor etwas", "Man muss vorsichtig sein", "Es bedeutet: Achtung, Gefahr"], options: ["Vorfahrt", "Stopp", "Achtung Gefahr", "Einbahnstraße"], correct: 2, sachlich: "Das Schild mit rotem Dreieck und Ausrufezeichen ist ein Gefahrenzeichen. Es warnt vor einer nicht genau benannten Gefahr. Fahrer müssen besonders aufmerksam und vorsichtig sein. Solche Schilder stehen oft an gefährlichen Stellen wie Baustellen oder unübersichtlichen Kurven.", anekdotisch: "Das Ausrufezeichen-Schild ist wie ein großes 'Vorsicht!'-Rufen! Es sagt: Hier musst du besonders gut aufpassen! Vielleicht ist die Straße glatt, vielleicht sind Bauarbeiten, oder es gibt eine andere Gefahr. Wenn du mit dem Fahrrad unterwegs bist und so ein Schild siehst, solltest du langsamer fahren und deine Augen offen halten. Das Schild hat ein rotes Dreieck, damit man es sofort sieht - rot bedeutet immer: Achtung!"},

            {q: "Welcher Vogel kann nicht fliegen?", hints: ["Er lebt in Afrika", "Er ist der größte Vogel der Welt", "Er kann sehr schnell rennen"], options: ["Adler", "Strauß", "Papagei", "Pinguin"], correct: 1, sachlich: "Der Strauß ist der größte Vogel der Welt und kann nicht fliegen. Er wird bis zu 2,70 Meter groß und wiegt über 100 Kilogramm. Dafür kann er sehr schnell rennen - bis zu 70 km/h! Auch Pinguine können nicht fliegen, sondern schwimmen.", anekdotisch: "Der Strauß ist riesig - viel größer als du! Er ist so schwer, dass seine Flügel ihn nicht tragen können. Aber das macht nichts, denn er kann super schnell rennen - schneller als ein Auto in der Stadt! Wenn Gefahr droht, rennt der Strauß einfach davon. Seine Beine sind so stark, dass ein Tritt von ihm gefährlich sein kann. Strauße legen die größten Eier der Welt - ein Ei ist so groß wie 20 Hühnereier zusammen!"},

            {q: "Was ist die Hauptstadt von Spanien?", hints: ["Die Stadt liegt in der Mitte von Spanien", "Der Name klingt ähnlich wie 'Mama'", "Die Stadt ist berühmt für Fußball"], options: ["Barcelona", "Madrid", "Sevilla", "Valencia"], correct: 1, sachlich: "Madrid ist die Hauptstadt von Spanien und die größte Stadt des Landes. Etwa 3,3 Millionen Menschen leben dort. Madrid liegt fast genau in der Mitte Spaniens. Die Stadt ist bekannt für ihre Museen, Paläste und den berühmten Fußballverein Real Madrid.", anekdotisch: "Madrid ist eine riesige, lebendige Stadt! Dort ist es im Sommer super heiß - manchmal über 40 Grad! Die Menschen in Madrid essen oft erst abends um 22 Uhr zu Abend, weil es tagsüber zu heiß ist. Die Stadt ist berühmt für Real Madrid, einen der besten Fußballvereine der Welt. In Madrid gibt es einen riesigen Königspalast mit über 3.000 Zimmern! Die Leute dort sprechen Spanisch und lieben Tapas - das sind kleine leckere Häppchen."},

            {q: "Wie viele Kontinente gibt es auf der Erde?", hints: ["Es sind mehr als 5", "Afrika, Europa und Asien gehören dazu", "Die Zahl ist 7"], options: ["5", "6", "7", "8"], correct: 2, sachlich: "Es gibt 7 Kontinente: Afrika, Antarktika, Asien, Australien/Ozeanien, Europa, Nordamerika und Südamerika. Asien ist der größte Kontinent, Australien der kleinste. Die Antarktis ist komplett von Eis bedeckt.", anekdotisch: "Die Welt besteht aus 7 riesigen Landmassen - das sind die Kontinente! Asien ist der größte - dort leben die meisten Menschen, in China und Indien. Europa ist viel kleiner, aber es gibt dort viele Länder. Afrika ist super heiß und hat die größte Wüste. Australien liegt ganz allein im Meer - da leben Kängurus! Nord- und Südamerika sind wie Geschwister. Und die Antarktis ganz unten ist eine Eiswüste - da leben nur Pinguine und Forscher!"},

            {q: "Was macht die Feuerwehr als erstes, wenn sie zum Brand kommt?", hints: ["Sie muss sich zuerst um etwas kümmern", "Menschen sind wichtiger als Sachen", "Sie rettet Leben"], options: ["Wasser holen", "Menschen retten", "Fotos machen", "Schlauch ausrollen"], correct: 1, sachlich: "Die wichtigste Aufgabe der Feuerwehr ist es, Menschen und Tiere zu retten. Erst danach wird das Feuer gelöscht. Die Feuerwehr folgt immer dem Grundsatz: Retten, Löschen, Bergen, Schützen - in dieser Reihenfolge. Menschen retten steht an erster Stelle.", anekdotisch: "Die Feuerwehr sind echte Helden! Wenn sie zu einem Feuer kommen, schauen sie zuerst: Sind noch Menschen im Haus? Die müssen als erstes gerettet werden! Dafür haben Feuerwehrleute Atemschutzmasken und gehen in die brennenden Häuser. Erst wenn alle Menschen in Sicherheit sind, beginnen sie mit dem Löschen. Manchmal retten sie auch Haustiere wie Katzen, Hunde oder Hamster. Die Feuerwehr übt das regelmäßig, damit im Notfall jeder Handgriff sitzt!"},

            {q: "Wie heißt der größte Stern in unserem Sonnensystem?", hints: ["Er leuchtet am Tag", "Ohne ihn gäbe es kein Leben auf der Erde", "Er ist gelb und heiß"], options: ["Der Mond", "Die Sonne", "Jupiter", "Saturn"], correct: 1, sachlich: "Die Sonne ist der einzige Stern in unserem Sonnensystem und bei weitem der größte Himmelskörper. Sie ist etwa 1,4 Millionen Kilometer groß - in sie würden 1,3 Millionen Erden passen! Die Sonne ist ein gigantischer Ball aus heißem Gas und ihre Oberfläche ist etwa 5.500 Grad heiß.", anekdotisch: "Die Sonne ist unser Lebensspender! Ohne sie wäre die Erde eiskalt und dunkel - kein Leben wäre möglich. Die Sonne ist SO groß, dass eine Million Erden in sie reinpassen würden! Sie ist ein riesiger Feuerball, der ständig brennt. Das Licht der Sonne braucht 8 Minuten, um zur Erde zu kommen - das ist so schnell wie nichts anderes! Die Sonne gibt uns nicht nur Licht und Wärme, sondern auch die Energie für Wind und Regen. Deshalb solltest du nie direkt in die Sonne schauen - das kann deine Augen verletzen!"},

            {q: "Woraus besteht ein Regenbogen?", hints: ["Er entsteht, wenn Sonne und Regen zusammenkommen", "Es sind verschiedene Farben", "Licht wird gebrochen"], options: ["Nur Wasser", "Licht und Wassertropfen", "Wolken", "Farbe in der Luft"], correct: 1, sachlich: "Ein Regenbogen entsteht, wenn Sonnenlicht auf Regentropfen trifft. Das Licht wird in den Wassertropfen gebrochen und in die verschiedenen Farben zerlegt. Ein Regenbogen hat immer sieben Farben: Rot, Orange, Gelb, Grün, Blau, Indigo und Violett.", anekdotisch: "Regenbögen sind wie Magie am Himmel! Sie entstehen, wenn die Sonne scheint und es gleichzeitig regnet. Das weiße Sonnenlicht wird in den Regentropfen wie durch ein Prisma in alle Farben zerlegt - rot, orange, gelb, grün, blau, indigo und violett. Manche sagen, man findet am Ende eines Regenbogens einen Schatz! In Wirklichkeit hat ein Regenbogen gar kein Ende - er ist ein Kreis, aber von der Erde aus sieht man nur einen Bogen. Manchmal, wenn man Glück hat, sieht man sogar einen doppelten Regenbogen!"}
        ],
        12: [
            {q: "Welches ist das größte Organ des menschlichen Körpers?", hints: ["Es bedeckt deinen ganzen Körper", "Es schützt dich vor Kälte und Hitze", "Du kannst es sehen und anfassen"], options: ["Das Herz", "Die Haut", "Die Lunge", "Die Leber"], correct: 1, sachlich: "Die Haut ist das größte Organ des Menschen. Bei einem Erwachsenen wiegt sie etwa 3,5 bis 10 Kilogramm und hat eine Fläche von etwa 2 Quadratmetern. Die Haut schützt den Körper vor Krankheitserregern, reguliert die Temperatur und ermöglicht das Tasten.", anekdotisch: "Deine Haut ist wie eine riesige Schutzdecke, die dich komplett umhüllt! Sie ist nicht nur groß, sondern auch ziemlich clever. Wenn dir heiß ist, schwitzt sie, um dich abzukühlen. Wenn dir kalt ist, bekommst du Gänsehaut - das sind kleine Muskeln, die sich zusammenziehen. Deine Haut erneuert sich ständig: Jeden Tag verlierst du winzige Hautschuppen (das ist meistens der Staub zu Hause!), und neue Hautzellen wachsen nach. In der Haut sind Millionen winziger Sensoren, mit denen du spüren kannst, ob etwas heiß, kalt, weich oder stachelig ist. Ohne Haut könnten Bakterien in deinen Körper eindringen und dich krank machen!"},

            {q: "Wie nennt man den Prozess, bei dem Pflanzen aus Sonnenlicht Energie gewinnen?", hints: ["Der Name enthält 'Synthese'", "Pflanzen produzieren dabei Sauerstoff", "Es passiert in den grünen Blättern"], options: ["Atmung", "Verdauung", "Fotosynthese", "Zellteilung"], correct: 2, sachlich: "Fotosynthese ist der Prozess, bei dem Pflanzen mit Hilfe von Sonnenlicht aus Kohlendioxid und Wasser Zucker und Sauerstoff herstellen. Dies geschieht vor allem in den grünen Blättern, die Chlorophyll enthalten. Der produzierte Sauerstoff wird an die Luft abgegeben und ist lebensnotwendig für Menschen und Tiere.", anekdotisch: "Fotosynthese ist die geniale Superkraft der Pflanzen! Stell dir vor: Pflanzen können aus Sonnenlicht ihr eigenes Essen herstellen - das wäre, als könntest du Pizza machen, indem du einfach in die Sonne gehst! Die Pflanzen nehmen Kohlendioxid aus der Luft (das ist das Gas, das wir ausatmen) und Wasser aus dem Boden. Mit Hilfe von Sonnenlicht verwandeln sie das in Zucker (ihr Essen) und produzieren als Nebenprodukt Sauerstoff - genau das Gas, das wir zum Atmen brauchen! Deshalb sind Wälder so wichtig: Sie sind riesige Sauerstoff-Fabriken! Das Chlorophyll in den Blättern ist übrigens der Grund, warum Pflanzen grün aussehen."},

            {q: "Welcher Fluss ist der längste in Europa?", hints: ["Er fließt durch Russland", "Er mündet ins Kaspische Meer", "Sein Name beginnt mit W"], options: ["Die Donau", "Der Rhein", "Die Wolga", "Die Themse"], correct: 2, sachlich: "Die Wolga ist mit 3.530 Kilometern der längste Fluss Europas. Sie entspringt nordwestlich von Moskau und fließt ins Kaspische Meer. Die Wolga ist für Russland sehr wichtig als Transportweg und Energiequelle. Viele große russische Städte liegen an der Wolga.", anekdotisch: "Die Wolga ist gigantisch! Sie ist so lang, dass man mit dem Auto fast vier Stunden bei Tempo 100 brauchen würde, um sie entlangzufahren. In Russland nennt man die Wolga liebevoll 'Mütterchen Wolga', weil sie so wichtig für das Land ist. Auf der Wolga fahren große Schiffe, und im Winter ist sie manchmal zugefroren! Stell dir vor: ein riesiger Fluss komplett aus Eis! Viele Millionen Menschen leben an der Wolga, und es gibt dort sogar einen riesigen Staudamm, der Strom für ganze Städte produziert. Die Wolga fließt durch Wälder, Städte und weite Ebenen - eine richtige Reise quer durch Russland!"},

            {q: "Was ist 144 geteilt durch 12?", hints: ["Das Ergebnis ist kleiner als 20", "Du kannst es im kleinen Einmaleins finden", "Es ist eine glatte Zahl"], options: ["10", "11", "12", "13"], correct: 2, sachlich: "144 ÷ 12 = 12. Man kann auch sagen: 12 mal 12 ist 144. Die Zahl 144 ist eine besondere Zahl, man nennt sie auch '12 Dutzend' oder ein 'Gros'. Division ist die Umkehrung der Multiplikation.", anekdotisch: "144 geteilt durch 12 ist eine coole Rechnung! Das Ergebnis ist 12 - also die gleiche Zahl, durch die wir teilen! Das nennt man eine 'quadratische Zahl', weil 12 × 12 = 144 ist. Wenn du dir vorstellst, du hast 144 Bonbons und verteilst sie gleichmäßig an 12 Freunde, bekommt jeder genau 12 Bonbons. Die Zahl 144 ist besonders: Früher nannte man 144 Stück ein 'Gros' - das war eine wichtige Maßeinheit beim Handeln. Auch bei Eiern kennt man das: 12 Eier sind ein Dutzend, 144 Eier sind 12 Dutzend!"},

            {q: "In welchem Jahr landeten Menschen zum ersten Mal auf dem Mond?", hints: ["Es war im 20. Jahrhundert", "Es war in den 1960er Jahren", "Neil Armstrong war der erste Mensch dort"], options: ["1965", "1967", "1969", "1971"], correct: 2, sachlich: "Am 20. Juli 1969 landeten die ersten Menschen auf dem Mond. Die Astronauten Neil Armstrong und Buzz Aldrin stiegen aus der Raumkapsel 'Apollo 11'. Neil Armstrong sagte den berühmten Satz: 'Das ist ein kleiner Schritt für einen Menschen, aber ein großer Sprung für die Menschheit.'", anekdotisch: "Die Mondlandung 1969 war eine Sensation! Millionen Menschen auf der ganzen Welt saßen vor ihren Fernsehern und schauten zu, wie Neil Armstrong als erster Mensch seinen Fuß auf den Mond setzte. Die Rakete, die sie dorthin brachte, war höher als ein 30-stöckiges Haus! Die Astronauten trugen dicke weiße Raumanzüge, weil es auf dem Mond keinen Sauerstoff gibt und es dort wahnsinnig heiß oder eiskalt sein kann. Sie hinterließen Fußabdrücke im Mondstaub - die sind heute noch da, weil es auf dem Mond keinen Wind gibt! Die Astronauten brachten sogar Mondgestein zur Erde zurück, das Wissenschaftler heute noch untersuchen."},

            {q: "Welches chemische Element hat das Symbol 'O'?", hints: ["Wir brauchen es zum Atmen", "Es ist ein Gas", "Ohne es könnte nichts brennen"], options: ["Öl", "Ozon", "Sauerstoff", "Gold"], correct: 2, sachlich: "Das chemische Symbol 'O' steht für Sauerstoff (lateinisch: Oxygenium). Sauerstoff ist ein farbloses, geruchloses Gas. Es macht etwa 21% der Luft aus. Ohne Sauerstoff können Menschen, Tiere und Pflanzen nicht leben. Auch für Feuer ist Sauerstoff notwendig.", anekdotisch: "Sauerstoff ist das Gas, das uns am Leben hält! Mit jedem Atemzug nimmst du Sauerstoff auf, der dann durch dein Blut zu allen Körperzellen transportiert wird. Dein Blut ist rot, weil es voll mit Sauerstoff ist! Pflanzen produzieren Sauerstoff bei der Fotosynthese - deshalb sind Bäume und Wälder so wichtig. Sauerstoff brauchst du nicht nur zum Atmen: Ohne ihn könnte auch kein Feuer brennen! Deshalb erstickt eine Kerze, wenn du ein Glas drüber stülpst - der Sauerstoff ist aufgebraucht. Im Weltall gibt es keinen Sauerstoff, deshalb müssen Astronauten immer Sauerstoffflaschen dabei haben!"},

            {q: "Was ist die Wurzel aus 64?", hints: ["Es ist eine einstellige Zahl", "Diese Zahl mal sich selbst ergibt 64", "Die Zahl ist 8"], options: ["6", "7", "8", "9"], correct: 2, sachlich: "Die Quadratwurzel aus 64 ist 8, denn 8 × 8 = 64. Die Wurzel ist die Umkehrung des Quadrierens. Man schreibt: √64 = 8. Wurzelziehen ist eine wichtige mathematische Operation.", anekdotisch: "Die Wurzel aus 64 zu finden ist wie ein Rätsel zu lösen! Du fragst dich: Welche Zahl muss ich mit sich selbst multiplizieren, um 64 zu bekommen? Die Antwort ist 8, denn 8 × 8 = 64! Stell dir ein Quadrat vor, das 64 kleine Kästchen hat - wenn du es in gleich lange Reihen anordnest, sind es 8 Reihen mit je 8 Kästchen. Das Wurzelzeichen √ sieht aus wie ein kleines Häkchen mit Dach. Wurzelrechnen brauchst du später oft in Mathe und Physik. Fun Fact: 64 ist eine besondere Zahl - sie ist 2 × 2 × 2 × 2 × 2 × 2, also sechs mal die Zwei mit sich selbst multipliziert!"},

            {q: "Welches ist das schwerste Tier der Welt?", hints: ["Es lebt im Meer", "Es ist ein Säugetier", "Es kann über 30 Meter lang werden"], options: ["Elefant", "Hai", "Blauwal", "Dinosaurier"], correct: 2, sachlich: "Der Blauwal ist das schwerste und größte Tier, das jemals auf der Erde gelebt hat. Er kann bis zu 200 Tonnen wiegen und über 30 Meter lang werden. Sein Herz allein wiegt so viel wie ein Auto! Blauwale ernähren sich von winzigen Krebstieren, dem Krill.", anekdotisch: "Der Blauwal ist SO riesig, dass es schwer vorstellbar ist! Er wiegt so viel wie 33 Elefanten zusammen! Sein Herz ist so groß wie ein kleines Auto, und durch seine Hauptschlagader könnte ein Kind schwimmen! Trotz ihrer enormen Größe ernähren sich Blauwale von winzigen Krebstieren - Krill - die sie mit ihren Barten aus dem Wasser filtern. Ein Blauwal kann pro Tag 4 Tonnen Krill fressen - das ist so viel wie 40.000 Hamburger! Wenn ein Blauwal singt (sie kommunizieren mit tiefen Tönen), kann man das über hunderte Kilometer weit im Ozean hören. Leider sind Blauwale vom Aussterben bedroht, weil sie früher stark gejagt wurden."},

            {q: "Wie viele Seiten hat ein Würfel?", hints: ["Es sind mehr als 4", "Jede Seite ist ein Quadrat", "Denk an einen Spielwürfel"], options: ["4", "5", "6", "8"], correct: 2, sachlich: "Ein Würfel hat 6 Seiten, 8 Ecken und 12 Kanten. Alle Seiten eines Würfels sind gleich große Quadrate. Ein Würfel ist ein spezieller geometrischer Körper, ein sogenannter Hexaeder.", anekdotisch: "Ein Würfel hat 6 Seiten - das siehst du bei einem Spielwürfel! Wenn du alle Seiten zusammenzählst (1+2+3+4+5+6), ergibt das 21 - das ist kein Zufall, Spielwürfel werden immer so gemacht! Die gegenüberliegenden Seiten eines Würfels ergeben immer 7 (1 und 6, 2 und 5, 3 und 4). Würfel sind praktisch: Zuckerwürfel, Rubik's Cube, Spielwürfel - überall findest du sie! In der Mathematik ist ein Würfel besonders, weil alle Seiten gleich lang sind. Wenn jede Seite 1 cm lang ist, hat der Würfel ein Volumen von 1 cm³!"},

            {q: "Welcher Kontinent hat die meisten Einwohner?", hints: ["Dort liegen China und Indien", "Es ist der größte Kontinent", "Über 4 Milliarden Menschen leben dort"], options: ["Afrika", "Europa", "Asien", "Amerika"], correct: 2, sachlich: "Asien ist der bevölkerungsreichste Kontinent mit über 4,6 Milliarden Menschen - das sind etwa 60% der Weltbevölkerung. Die zwei bevölkerungsreichsten Länder der Welt, China und Indien, liegen in Asien. Asien ist auch der größte Kontinent der Erde.", anekdotisch: "In Asien leben mehr Menschen als auf allen anderen Kontinenten zusammen! Stell dir vor: Von 10 Menschen auf der Welt leben 6 in Asien! Die größten Städte der Welt sind dort: Tokio, Delhi, Shanghai. In Asien findest du alles: Den höchsten Berg (Mount Everest), riesige Wüsten (Gobi), tropische Regenwälder und eiskalte Steppen in Sibirien. In China allein leben 1,4 Milliarden Menschen - das sind fast so viele wie in ganz Afrika! In Asien werden hunderte verschiedene Sprachen gesprochen, und es gibt total unterschiedliche Kulturen: von Japan über Indien bis in die arabischen Länder."},

            {q: "Was ist ein Synonym?", hints: ["Es geht um Wörter", "Die Wörter haben eine ähnliche Bedeutung", "Zum Beispiel: 'groß' und 'riesig'"], options: ["Ein Gegenwort", "Ein Ähnlichwort", "Ein Fremdwort", "Ein Reimwort"], correct: 1, sachlich: "Ein Synonym ist ein Wort, das die gleiche oder eine sehr ähnliche Bedeutung wie ein anderes Wort hat. Beispiele: 'schnell' und 'rasch', 'groß' und 'riesig', 'lustig' und 'witzig'. Synonyme machen Texte abwechslungsreicher und interessanter.", anekdotisch: "Synonyme sind wie Geschwister von Wörtern - sie sehen vielleicht etwas anders aus, aber sie bedeuten fast das Gleiche! Wenn du in einem Aufsatz nicht immer 'schön' schreiben willst, kannst du stattdessen 'hübsch', 'wunderschön', 'attraktiv' oder 'bezaubernd' verwenden. Das macht deine Texte viel interessanter! Manche Wörter haben ganz viele Synonyme - für 'sagen' kannst du auch 'sprechen', 'erzählen', 'berichten', 'mitteilen', 'flüstern' oder 'schreien' benutzen. Je nach Synonym ändert sich die Stimmung deines Satzes! Im Deutschunterricht ist es super wichtig, viele Synonyme zu kennen - das zeigt, dass du einen großen Wortschatz hast!"},

            {q: "Welches Land hat die Form eines Stiefels?", hints: ["Es liegt in Südeuropa", "Dort steht der Schiefe Turm von Pisa", "Die Hauptstadt ist Rom"], options: ["Spanien", "Griechenland", "Italien", "Frankreich"], correct: 2, sachlich: "Italien hat die charakteristische Form eines Stiefels. Das Land ragt weit ins Mittelmeer hinein. Italien ist bekannt für seine Geschichte (Römisches Reich), seine Kultur, seine Kunst und natürlich für Pizza und Pasta. Die Hauptstadt ist Rom.", anekdotisch: "Wenn du auf eine Karte schaust, sieht Italien wirklich aus wie ein Stiefel, der ins Meer tritt! Der 'Absatz' ist die Region Apulien, und die 'Stiefelspitze' ist Kalabrien. Unten dran hängt noch die Insel Sizilien wie ein Ball, den der Stiefel kickt! Italien ist berühmt für so viele Dinge: Pizza aus Neapel, Spaghetti, Gelato (das beste Eis der Welt!), und natürlich den Schiefen Turm von Pisa. In Italien steht auch das Kolosseum in Rom, wo früher die Gladiatoren kämpften. Die Italiener sind verrückt nach Fußball und essen gerne zusammen mit der ganzen Familie. In Italien gibt es auch aktive Vulkane wie den Vesuv und den Ätna!"},

            {q: "Wie viele Knochen hat ein erwachsener Mensch ungefähr?", hints: ["Es sind über 200", "Die genaue Zahl liegt bei 206", "Babys haben sogar noch mehr!"], options: ["156", "186", "206", "256"], correct: 2, sachlich: "Ein erwachsener Mensch hat etwa 206 Knochen. Bei der Geburt haben Babys noch über 300 Knochen, aber viele verwachsen im Laufe der Zeit miteinander. Der größte Knochen ist der Oberschenkelknochen, der kleinste ist der Steigbügel im Ohr. Knochen geben dem Körper Halt und schützen wichtige Organe.", anekdotisch: "Du hast 206 Knochen in deinem Körper - das ist wie ein lebendiges Skelett! Als Baby hattest du sogar noch mehr Knochen, aber manche sind zusammengewachsen, als du größer wurdest. Dein größter Knochen ist der Oberschenkelknochen - der ist richtig stabil und kann fast eine Tonne Gewicht tragen! Der kleinste Knochen ist winzig und sitzt in deinem Ohr - er heißt Steigbügel und ist nur 3 Millimeter groß! Deine Knochen sind nicht tot wie ein Skelett im Museum - sie leben! Sie wachsen, reparieren sich selbst, wenn sie brechen, und produzieren sogar Blutzellen! Mehr als die Hälfte deiner Knochen sind in deinen Händen und Füßen - deshalb kannst du damit so geschickt sein!"},

            {q: "Welches Gas atmen Menschen ein?", hints: ["Es macht etwa 21% der Luft aus", "Pflanzen produzieren es", "Wir brauchen es zum Leben"], options: ["Kohlendioxid", "Sauerstoff", "Stickstoff", "Wasserstoff"], correct: 1, sachlich: "Menschen atmen Sauerstoff ein und Kohlendioxid aus. Sauerstoff macht etwa 21% der Luft aus, der Rest ist hauptsächlich Stickstoff (78%). Der eingeatmete Sauerstoff wird im Blut transportiert und von den Zellen zur Energiegewinnung genutzt.", anekdotisch: "Mit jedem Atemzug nimmst du Sauerstoff auf - das ist das Gas, das dich am Leben hält! Deine Lungen saugen die Luft ein, und der Sauerstoff geht ins Blut über. Das Blut ist wie ein Lieferservice, der den Sauerstoff zu allen deinen Körperzellen bringt. Dort wird er gebraucht, um Energie zu machen - wie Benzin für ein Auto! Als Abfall produzieren deine Zellen Kohlendioxid, das atmest du wieder aus. Interessant: Du atmest nicht nur Sauerstoff ein, sondern auch viel Stickstoff - aber den benutzt dein Körper nicht, der geht einfach wieder raus! Menschen atmen etwa 20.000 Mal am Tag - meistens merkst du das gar nicht, weil es automatisch passiert!"},

            {q: "Was ist die Hauptstadt von Australien?", hints: ["Es ist NICHT Sydney oder Melbourne", "Die Stadt wurde extra als Hauptstadt gebaut", "Der Name beginnt mit C"], options: ["Sydney", "Melbourne", "Canberra", "Brisbane"], correct: 2, sachlich: "Canberra ist die Hauptstadt von Australien. Die Stadt wurde 1913 speziell als Hauptstadt geplant und gebaut, weil Sydney und Melbourne sich nicht einigen konnten, welche Stadt Hauptstadt werden sollte. Canberra liegt zwischen Sydney und Melbourne und hat etwa 430.000 Einwohner.", anekdotisch: "Viele Leute denken, Sydney ist die Hauptstadt von Australien, aber das stimmt nicht! Die echte Hauptstadt ist Canberra - eine Stadt, die extra gebaut wurde, weil Sydney und Melbourne sich stritten, wer Hauptstadt sein darf. Also bauten sie einfach eine komplett neue Stadt dazwischen! Canberra ist viel kleiner und ruhiger als Sydney oder Melbourne. Dort steht das Parlament und viele wichtige Regierungsgebäude. Die Stadt wurde clever geplant: Es gibt viele Parks, breite Straßen und einen künstlichen See mitten in der Stadt! In Canberra ist es im Sommer heiß und im Winter kann es sogar schneien - in den Bergen drum herum kann man Ski fahren!"},

            {q: "Wie heißt der Prozess, bei dem Wasser verdunstet und wieder als Regen fällt?", hints: ["Es ist ein Kreislauf", "Sonne, Wolken und Regen spielen eine Rolle", "Das Wort enthält 'Kreislauf'"], options: ["Fotosynthese", "Wasserkreislauf", "Verdauung", "Erosion"], correct: 1, sachlich: "Der Wasserkreislauf beschreibt, wie Wasser auf der Erde zirkuliert. Durch Sonnenwärme verdunstet Wasser aus Meeren, Seen und Flüssen. Der Wasserdampf steigt auf, bildet Wolken und fällt als Regen oder Schnee wieder zur Erde. Das Wasser fließt in Flüsse und Meere zurück, und der Kreislauf beginnt von vorn.", anekdotisch: "Der Wasserkreislauf ist wie eine riesige Waschmaschine der Natur! Die Sonne erwärmt das Wasser in Meeren und Seen, und es verdunstet - es wird zu unsichtbarem Dampf in der Luft. Hoch oben in der Luft ist es kalt, und der Dampf wird wieder zu winzigen Wassertröpfchen - die bilden Wolken! Wenn die Wolken zu schwer werden, fällt das Wasser als Regen (oder Schnee, wenn es kalt genug ist) wieder runter. Das Regenwasser sammelt sich in Bächen und Flüssen und fließt zurück ins Meer. Und dann geht alles wieder von vorne los! Das gleiche Wasser, das du heute trinkst, könnte vor Millionen Jahren schon ein Dinosaurier getrunken haben - cool, oder?"},

            {q: "Was bedeutet 'Migration'?", hints: ["Es geht um Bewegung", "Menschen oder Tiere wechseln den Ort", "Zugvögel machen das jedes Jahr"], options: ["Wanderung/Umzug", "Krankheit", "Feiertag", "Erfindung"], correct: 0, sachlich: "Migration bedeutet Wanderung oder Umzug. Menschen migrieren, wenn sie von einem Land in ein anderes ziehen, zum Beispiel um zu arbeiten oder weil sie vor Krieg fliehen. Auch Tiere migrieren: Zugvögel fliegen im Winter in wärmere Länder und im Frühjahr zurück. Migration ist ein natürlicher Prozess.", anekdotisch: "Migration bedeutet, dass jemand an einen anderen Ort zieht - oft in ein anderes Land. Viele Menschen sind im Laufe der Geschichte migriert: um bessere Jobs zu finden, vor Kriegen zu fliehen oder bei ihrer Familie zu sein. Auch Tiere migrieren! Störche fliegen jeden Winter von Deutschland nach Afrika - über 10.000 Kilometer! Lachse schwimmen hunderte Kilometer flussaufwärts, um ihre Eier zu legen. Und Gnus in Afrika wandern in riesigen Herden auf der Suche nach frischem Gras. Migration ist überall: Vielleicht sind deine Großeltern auch mal in eine andere Stadt gezogen, oder Freunde von dir kommen aus einem anderen Land. Menschen und Tiere waren schon immer unterwegs!"},

            {q: "Welches ist das kleinste Land der Welt?", hints: ["Es liegt in der Stadt Rom", "Der Papst wohnt dort", "Es ist nur 0,44 Quadratkilometer groß"], options: ["Monaco", "Vatikanstadt", "San Marino", "Liechtenstein"], correct: 1, sachlich: "Die Vatikanstadt ist mit 0,44 Quadratkilometern das kleinste Land der Welt. Es liegt mitten in Rom, Italien. Im Vatikan wohnt der Papst, das Oberhaupt der katholischen Kirche. Obwohl es so klein ist, hat die Vatikanstadt eine eigene Regierung, Flagge und sogar eigene Briefmarken.", anekdotisch: "Die Vatikanstadt ist so winzig, dass du sie in 20 Minuten zu Fuß umrunden könntest! Trotzdem ist es ein echtes Land mit allem Drum und Dran: eigener Flagge, eigenen Münzen und sogar einer eigenen Armee (die Schweizergarde mit den bunten Uniformen)! Im Vatikan steht der riesige Petersdom, eine der schönsten Kirchen der Welt, und die Sixtinische Kapelle mit den berühmten Deckengemälden von Michelangelo. Nur etwa 800 Menschen leben im Vatikan - das sind weniger als in manchen Schulen! Der Papst, der Chef der katholischen Kirche, wohnt dort. Obwohl der Vatikan so klein ist, kommen jedes Jahr Millionen Touristen zu Besuch!"},

            {q: "Was ist ein Verb?", hints: ["Es ist eine Wortart", "Es beschreibt, was jemand tut", "Beispiele: laufen, spielen, essen"], options: ["Ein Namenwort", "Ein Tunwort", "Ein Wiewort", "Ein Zahlwort"], correct: 1, sachlich: "Ein Verb ist ein Tunwort oder Zeitwort. Verben beschreiben Tätigkeiten, Vorgänge oder Zustände. Beispiele: laufen, schlafen, sein, werden. Verben kann man in verschiedene Zeitformen setzen (Gegenwart, Vergangenheit, Zukunft) und nach Personen beugen (ich laufe, du läufst).", anekdotisch: "Verben sind die Action-Wörter in der Sprache! Ohne Verben könntest du nicht sagen, was du tust: spielen, rennen, essen, schlafen, lachen - alles Verben! Sie zeigen dir, was passiert. Ein cooler Trick: Verben kann man in verschiedene Zeiten setzen. 'Ich spiele' ist jetzt (Gegenwart), 'ich spielte' war gestern (Vergangenheit), und 'ich werde spielen' ist morgen (Zukunft). Verben kann man auch verändern: ich gehe, du gehst, er geht, wir gehen - das nennt man konjugieren. In jedem Satz brauchst du mindestens ein Verb, sonst ist es kein richtiger Satz! Verben sind wie der Motor eines Satzes - sie bringen die Action!"},

            {q: "Welches Metall leitet Strom am besten?", hints: ["Es ist ein Edelmetall", "Es wird für Schmuck verwendet", "Sein chemisches Symbol ist Ag"], options: ["Gold", "Kupfer", "Silber", "Aluminium"], correct: 2, sachlich: "Silber ist der beste elektrische Leiter aller Metalle. Es leitet Strom noch besser als Kupfer oder Gold. Allerdings ist Silber teuer, deshalb verwendet man für Stromleitungen meist Kupfer. Silber wird aber in speziellen elektronischen Geräten eingesetzt, wo es auf beste Leitfähigkeit ankommt.", anekdotisch: "Silber ist der Champion unter den Stromleitern! Es kann Elektrizität besser leiten als jedes andere Metall - sogar besser als Gold! Deshalb findet man Silber in teuren Elektronikteilen wie Handys, Computern und Solarzellen. Aber weil Silber ziemlich teuer ist, benutzt man für normale Stromkabel Kupfer - das leitet auch gut und kostet viel weniger. Silber kann aber noch mehr: Es glänzt wunderschön (deshalb macht man Schmuck daraus) und es tötet Bakterien! Früher legten die Leute Silbermünzen in Milchkannen, damit die Milch länger frisch blieb. Verrückt, oder?"}

    let currentAge = 11;
    let currentQuestionIndex = 0;
    let currentHintIndex = 0;
    let answered = false;

    function startNew() {
        currentAge = parseInt(document.getElementById('age-select').value);
        currentQuestionIndex = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= 20) {
            alert('Quiz beendet! Alle 20 Fragen geschafft! 🎉');
            location.reload();
            return;
        }

        answered = false;
        currentHintIndex = 0;
        document.getElementById('next-btn').classList.add('hidden');
        
        const ageQuestions = questions[currentAge];
        const question = ageQuestions[currentQuestionIndex];
        
        document.getElementById('current-age').textContent = currentAge;
        document.getElementById('current-question').textContent = currentQuestionIndex + 1;
        document.getElementById('question-text').textContent = question.q;
        document.getElementById('hint-1-text').textContent = question.hints[0];
        document.getElementById('hint-2-text').textContent = question.hints[1];
        document.getElementById('hint-3-text').textContent = question.hints[2];
        
        document.getElementById('hint-1').classList.remove('visible');
        document.getElementById('hint-2').classList.remove('visible');
        document.getElementById('hint-3').classList.remove('visible');
        document.getElementById('hint-btn').disabled = false;
        document.getElementById('hint-btn').textContent = 'Nächster Hinweis';
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        question.options.forEach((option, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.textContent = option;
            div.onclick = () => selectOption(index, question);
            optionsContainer.appendChild(div);
        });
        
        document.getElementById('explanation-box').innerHTML = '';
        document.getElementById('explanation-box').classList.add('hidden');
    }

    function showNextHint() {
        if (currentHintIndex < 3) {
            currentHintIndex++;
            document.getElementById(`hint-${currentHintIndex}`).classList.add('visible');
            if (currentHintIndex === 3) {
                document.getElementById('hint-btn').disabled = true;
                document.getElementById('hint-btn').textContent = 'Alle Hinweise angezeigt';
            }
        }
    }

    function selectOption(selected, question) {
        if (answered) return;
        answered = true;
        
        const options = document.querySelectorAll('.option');
        options.forEach((opt, idx) => {
            if (idx === question.correct) opt.classList.add('correct');
            if (idx === selected && idx !== question.correct) opt.classList.add('wrong');
            opt.style.cursor = 'default';
            opt.onclick = null;
        });
        
        const explanationBox = document.getElementById('explanation-box');
        explanationBox.innerHTML = `
            <div class="explanation-title">✓ ${question.options[question.correct]}</div>
            <div class="explanation-section">
                <div class="section-title">📚 Erklärung:</div>
                <p>${question.sachlich}</p>
            </div>
            <div class="explanation-section">
                <div class="section-title">💡 Wusstest du?</div>
                <p>${question.anekdotisch}</p>
            </div>
        `;
        explanationBox.classList.remove('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion();
    }

    function showPauseModal() {
        document.getElementById('pause-age').textContent = currentAge;
        document.getElementById('pause-question').textContent = currentQuestionIndex + 1;
        document.getElementById('pause-modal').classList.remove('hidden');
    }

    function closePauseModal() {
        document.getElementById('pause-modal').classList.add('hidden');
    }

    function savePause(slot) {
        const note = document.getElementById('note-text').value;
        const saveData = {
            age: currentAge,
            question: currentQuestionIndex,
            note: note,
            timestamp: new Date().toLocaleString('de-DE')
        };
        localStorage.setItem(`kids-quiz-slot-${slot}`, JSON.stringify(saveData));
        alert(`Pause in Slot ${slot} gespeichert! 💾`);
        closePauseModal();
    }

    function resumeSlot(slot) {
        const saveData = localStorage.getItem(`kids-quiz-slot-${slot}`);
        if (!saveData) {
            alert('Kein gespeicherter Stand!');
            return;
        }
        const data = JSON.parse(saveData);
        currentAge = data.age;
        currentQuestionIndex = data.question;
        if (data.note) {
            alert(`Notiz: ${data.note}\n\nAlter: ${data.age}, Frage: ${data.question + 1}`);
        }
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    window.onload = function() {
        const slot1 = localStorage.getItem('kids-quiz-slot-1');
        const slot2 = localStorage.getItem('kids-quiz-slot-2');
        if (slot1) {
            const data1 = JSON.parse(slot1);
            document.getElementById('resume-1').textContent = `📖 Weitermachen Slot 1 (${data1.age} Jahre, Frage ${data1.question + 1})`;
        } else {
            document.getElementById('resume-1').disabled = true;
        }
        if (slot2) {
            const data2 = JSON.parse(slot2);
            document.getElementById('resume-2').textContent = `📖 Weitermachen Slot 2 (${data2.age} Jahre, Frage ${data2.question + 1})`;
        } else {
            document.getElementById('resume-2').disabled = true;
        }
    };
</script>
