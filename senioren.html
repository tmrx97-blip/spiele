<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senioren-Quiz - Zeitgeschehen</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --text-color: #2c3e50;
            --accent-color: #e67e22;
            --success-color: #27ae60;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 3px solid var(--accent-color);
            box-sizing: border-box;
        }

        h1 { color: var(--accent-color); font-size: 1.8rem; text-align: center; }
        
        .level-select { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin: 20px 0; 
        }

        button {
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button.secondary { background: #7f8c8d; }

        .question-box { font-size: 1.5rem; line-height: 1.3; margin-bottom: 20px; font-weight: bold; }
        .hint-box { background: #f8f9fa; padding: 15px; border-left: 6px solid var(--accent-color); margin: 8px 0; font-size: 1.1rem; }
        .result-box { display: none; background: #f0fff4; padding: 20px; border-radius: 15px; margin-top: 15px; border: 2px solid var(--success-color); }
        .anecdote { color: #444; font-size: 1.1rem; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; font-style: italic; }
        .joker-box { background: #fff9db; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed #f1c40f; }

        #barometer-container {
            position: sticky;
            bottom: 10px;
            background: white;
            padding: 10px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            max-width: 300px;
            margin-top: 20px;
            border: 2px solid var(--text-color);
        }
        .baro-btn { width: 50px; height: 50px; font-size: 1.5rem; border-radius: 50%; padding: 0; }

        .hidden { display: none; }
        .visible { display: block !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="setup-screen">
            <h1>Senioren-Quiz</h1>
            <p style="text-align:center;">Wähle die Herausforderung:</p>
            <div class="level-select">
                <button onclick="startGame(35)">35%</button>
                <button onclick="startGame(50)">50%</button>
                <button onclick="startGame(70)">70%</button>
                <button onclick="startGame(90)">90%</button>
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="progress" style="font-weight: bold; color: var(--accent-color); margin-bottom: 10px;"></div>
            <div class="question-box" id="question-text"></div>
            
            <div id="hint-1" class="hint-box"><strong>Tipp 1:</strong> <span id="hint-1-text"></span></div>
            <div id="hint-extra" class="hidden">
                <div class="hint-box"><strong>Tipp 2:</strong> <span id="hint-2-text"></span></div>
                <div class="hint-box"><strong>Tipp 3:</strong> <span id="hint-3-text"></span></div>
            </div>

            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <button id="btn-success" onclick="showResult(true)">Ich hab's!</button>
                <button id="btn-more-hints" class="secondary" onclick="revealMoreHints()">Mehr Hinweise</button>
                <button id="btn-solve" class="secondary" onclick="showResult(false)">Lösung</button>
            </div>

            <div id="result-area" class="result-box">
                <h2 id="reward-title" style="margin:0; font-size: 1.3rem;"></h2>
                <p id="solution-text" style="font-size: 1.2rem; font-weight: bold; margin: 10px 0;"></p>
                <p id="anecdote-text" class="anecdote"></p>
                <div class="joker-box">
                    <strong>Erzähl-Impulse für euch:</strong>
                    <ul id="joker-list" style="margin: 5px 0; padding-left: 20px;"></ul>
                </div>
                <button onclick="nextQuestion()" style="margin-top: 15px; background: var(--text-color);">Nächstes Thema</button>
            </div>
        </div>

        <div id="end-screen" class="hidden">
            <h1>Toll gemacht!</h1>
            <p id="final-stats" style="font-size: 1.2rem; text-align: center;"></p>
            <button onclick="location.reload()">Neue Runde starten</button>
        </div>
    </div>

    <div id="barometer-container" class="hidden">
        <button class="baro-btn" style="background:#e74c3c" onclick="changeBaro(-1)">-</button>
        <div id="baro-val" style="font-size: 1.4rem; font-weight: bold;">0</div>
        <button class="baro-btn" style="background:#27ae60" onclick="changeBaro(1)">+</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        const questionPool = {
            35: [
                {
                    q: "Welche beliebte Moderatorin begrüßt ihre Gäste in der Hamburger Kneipe 'Zum Schellfischposten'?",
                    h1: "Die Sendung heißt 'Inas Nacht'.", h2: "Sie ist bekannt für ihr loses Mundwerk.", h3: "Ihr Vorname reimt sich auf das Land 'China'.",
                    sol: "Ina Müller", reward: "Ganz genau! Du kennst dich im Fernsehen hervorragend aus.",
                    anecdote: "In die Kneipe passen nur 14 Gäste, weshalb die Stimmung immer so persönlich ist.",
                    joker: ["Warst du schon mal in Hamburg?", "Welche Talkshows schaust du am liebsten?"]
                }
            ],
            50: [
                {
                    q: "Welches kleine Gerät hat die klassische Fotokamera fast völlig aus unserem Alltag verdrängt?",
                    h1: "Man trägt es immer in der Hosentasche.", h2: "Man kann damit auch telefonieren.", h3: "Man nennt es auch 'schlaues Telefon'.",
                    sol: "Das Smartphone", reward: "Punktlandung! Du bist absolut am Puls der Zeit.",
                    anecdote: "Ein heutiges Smartphone hat mehr Rechenkraft als die Computer der ersten Mondlandung.",
                    joker: ["Was war deine erste Kamera?", "Wem schickst du heute Nachrichten oder Bilder?"]
                },
                {
                    q: "Welche Stadt war Gastgeber der spektakulären Olympischen Spiele im Jahr 2024?",
                    h1: "Sie wird oft als 'Stadt der Liebe' bezeichnet.", h2: "Dort steht der berühmte Eiffelturm.", h3: "Es ist die Hauptstadt unserer Nachbarn im Westen.",
                    sol: "Paris", reward: "Wunderbar gewusst! Dein Weltwissen ist ausgezeichnet.",
                    anecdote: "Die Eröffnungsfeier fand zum ersten Mal nicht im Stadion, sondern auf Booten auf der Seine statt.",
                    joker: ["Warst du schon mal in Paris?", "Verfolgst du Sport-Großereignisse gerne im Fernsehen?"]
                },
                {
                    q: "Welcher deutsche Astronaut begeisterte Millionen Menschen mit seinen Fotos von der Erde aus dem All?",
                    h1: "Sein Spitzname ist 'Astro-Alex'.", h2: "Er fotografierte die Erde von der ISS aus.", h3: "Er kommt aus Künzelsau und hat eine markante Glatze.",
                    sol: "Alexander Gerst", reward: "Hervorragend! Ein echtes Fachwissen über die Sterne.",
                    anecdote: "Er verbrachte insgesamt fast ein ganzes Jahr im Weltraum.",
                    joker: ["Hättest du früher auch gerne mal die Welt von ganz oben gesehen?", "Fasziniert dich die Raumfahrt?"]
                }
            ],
            70: [
                {
                    q: "Was feierte Deutschland im Jahr 2019 mit einer 15 Kilometer langen Lichtgrenze in Berlin?",
                    h1: "Es ging um ein großes Jubiläum von 1989.", h2: "Berlin war früher durch ein Bauwerk geteilt.", h3: "Es war der 30. Jahrestag eines historischen Falls.",
                    sol: "30 Jahre Mauerfall", reward: "Meisterhaft! Du bewahrst die wichtigen Momente unserer Geschichte.",
                    anecdote: "8.000 leuchtende Ballons markierten damals den ehemaligen Mauerverlauf quer durch die Stadt.",
                    joker: ["Wo warst du, als die Nachricht vom Mauerfall kam?", "Was war für dich das prägendste Ereignis der letzten Jahrzehnte?"]
                }
            ],
            90: [
                {
                    q: "Welches riesige Teleskop liefert uns seit 2022 atemberaubende Bilder aus den tiefsten Weiten des Alls?",
                    h1: "Es ist der hochmoderne Nachfolger des Hubble-Teleskops.", h2: "Es blickt tiefer in die Vergangenheit des Universums als jedes Gerät zuvor.", h3: "Die Abkürzung der vier Namensteile lautet J-W-S-T.",
                    sol: "James-Webb-Teleskop", reward: "Brillant! Das ist Expertenwissen auf höchstem Niveau.",
                    anecdote: "Es ist 1,5 Millionen Kilometer von der Erde entfernt – das ist viermal weiter als der Mond.",
                    joker: ["Glaubst du, dass wir eines Tages Leben auf anderen Planeten finden?", "Bist du eher ein Technik-Fan oder genießt du lieber die Natur?"]
                }
            ]
        };

        let currentLevel = 50, selectedQuestions = [], currentIndex = 0, baro = 0;

        function startGame(lvl) {
            currentLevel = lvl;
            selectedQuestions = [...(questionPool[lvl] || questionPool[50])].sort(() => 0.5 - Math.random());
            currentIndex = 0;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('barometer-container').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = selectedQuestions[currentIndex];
            document.getElementById('progress').innerText = `Frage ${currentIndex + 1} von ${selectedQuestions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('hint-1-text').innerText = q.h1;
            document.getElementById('hint-2-text').innerText = q.h2;
            document.getElementById('hint-3-text').innerText = q.h3;
            document.getElementById('hint-extra').classList.add('hidden');
            document.getElementById('result-area').classList.remove('visible');
            document.getElementById('btn-more-hints').style.display = 'block';
            document.getElementById('btn-success').style.display = 'block';
            window.scrollTo(0,0);
        }

        function revealMoreHints() {
            document.getElementById('hint-extra').classList.add('visible');
            playTone(400, 0.1);
        }

        function showResult(win) {
            const q = selectedQuestions[currentIndex];
            const res = document.getElementById('result-area');
            res.classList.add('visible');
            document.getElementById('reward-title').innerText = win ? "Bravo!" : "Wieder etwas gelernt!";
            document.getElementById('solution-text').innerText = `Lösung: ${q.sol}`;
            document.getElementById('anecdote-text').innerText = q.anecdote;
            document.getElementById('joker-list').innerHTML = q.joker.map(j => `<li>${j}</li>`).join('');
            document.getElementById('btn-more-hints').style.display = 'none';
            document.getElementById('btn-success').style.display = 'none';
            playTone(win ? 600 : 300, 0.3);
            setTimeout(() => res.scrollIntoView({behavior: "smooth"}), 150);
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex < selectedQuestions.length) showQuestion();
            else showEnd();
        }

        function showEnd() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-stats').innerText = `Wir hatten eine tolle gemeinsame Zeit! Dein Barometer-Stand: ${baro}`;
        }

        function changeBaro(v) {
            baro += v;
            document.getElementById('baro-val').innerText = baro;
            playTone(v > 0 ? 800 : 200, 0.1);
        }
    </script>
</body>
</html>
