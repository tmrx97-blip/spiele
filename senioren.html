<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senioren-Quiz - Zeitgeschehen & Erinnerungen</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --text-color: #2c3e50;
            --accent-color: #e67e22;
            --success-color: #27ae60;
            --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--ui-font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 3px solid var(--accent-color);
        }

        h1 { color: var(--accent-color); font-size: 2.5rem; text-align: center; }
        
        /* Level Auswahl */
        .level-select { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: transform 0.2s, background 0.3s;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        button.secondary { background: #7f8c8d; }

        /* Quiz Elemente */
        .question-box { font-size: 2rem; line-height: 1.4; margin-bottom: 30px; font-weight: 700; }
        .hint-box { 
            background: #eee; 
            padding: 20px; 
            border-left: 10px solid var(--accent-color); 
            margin: 10px 0;
            font-size: 1.4rem;
            font-style: italic;
        }
        .result-box { 
            display: none; 
            background: #e8f6ef; 
            padding: 30px; 
            border-radius: 15px; 
            margin-top: 20px;
            border: 2px solid var(--success-color);
        }
        .anecdote { color: #555; font-size: 1.2rem; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px; }
        .joker-box { background: #fff3cd; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px dashed #856404; }

        /* Barometer */
        #barometer-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            border: 2px solid var(--text-color);
        }
        .baro-btn { width: 60px; height: 60px; font-size: 1.5rem; margin: 5px; border-radius: 50%; }
        .baro-plus { background: var(--success-color); }
        .baro-minus { background: #e74c3c; }

        .hidden { display: none; }
        .visible { display: block !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="setup-screen">
            <h1>Willkommen zum Zeitreise-Quiz</h1>
            <p style="text-align:center; font-size: 1.3rem;">Wähle die Herausforderung für heute:</p>
            <div class="level-select">
                <button onclick="startGame(35)">35% (Leicht)</button>
                <button onclick="startGame(50)">50% (Mittel)</button>
                <button onclick="startGame(70)">70% (Fortgeschritten)</button>
                <button onclick="startGame(90)">90% (Experte)</button>
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="progress" style="font-weight: bold; color: var(--accent-color);">Frage 1 von 12</div>
            <div class="question-box" id="question-text"></div>
            
            <div id="hint-1" class="hint-box"><strong>Hinweis:</strong> <span id="hint-1-text"></span></div>
            <div id="hint-extra" class="hidden">
                <div class="hint-box"><strong>Weitere Details:</strong> <span id="hint-2-text"></span></div>
                <div class="hint-box"><strong>Fast gelöst:</strong> <span id="hint-3-text"></span></div>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button id="btn-success" onclick="showResult(true)">Ich hab's!</button>
                <button id="btn-more-hints" class="secondary" onclick="revealMoreHints()">Mehr Hinweise</button>
                <button id="btn-solve" class="secondary" onclick="showResult(false)">Lösung zeigen</button>
            </div>

            <div id="result-area" class="result-box">
                <h2 id="reward-title"></h2>
                <p id="solution-text" style="font-size: 1.6rem; font-weight: bold;"></p>
                <p id="anecdote-text" class="anecdote"></p>
                
                <div class="joker-box" id="joker-area">
                    <strong>Der Erzähl-Joker:</strong>
                    <ul id="joker-list"></ul>
                </div>
                
                <button onclick="nextQuestion()" style="margin-top: 20px; background: var(--text-color);">Nächste Frage</button>
            </div>
        </div>

        <div id="end-screen" class="hidden">
            <h1>Wunderbar gemacht!</h1>
            <p id="final-stats" style="font-size: 1.5rem; text-align: center;"></p>
            <button onclick="location.reload()">Neues Spiel starten</button>
        </div>
    </div>

    <div id="barometer-container" class="hidden">
        <div style="font-weight: bold; margin-bottom: 5px;">Wissens-Barometer</div>
        <button class="baro-btn baro-plus" onclick="changeBaro(1)">+</button>
        <button class="baro-btn baro-minus" onclick="changeBaro(-1)">-</button>
        <div id="baro-val" style="font-size: 1.2rem; font-weight: bold; margin-top: 5px;">0</div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- FRAGEN POOL ---
        // (Beispielhafter Auszug, erweiterbar auf 36 pro Level)
        const questionPool = {
            35: [
                {
                    q: "Welche junge Schwedin bewegte ab 2018 die ganze Welt dazu, freitags für das Klima auf die Straße zu gehen?",
                    h1: "Sie reiste mit dem Segelschiff über den Atlantik.",
                    h2: "Ihr Vorname beginnt mit G.",
                    h3: "Greta Th...",
                    sol: "Greta Thunberg",
                    reward: "Hervorragend! Dein Blick für das Zeitgeschehen ist messerscharf.",
                    anecdote: "Wusstest du, dass sie anfangs ganz alleine mit einem Pappschild vor dem Parlament in Stockholm saß? Daraus wurde eine Weltbewegung.",
                    joker: ["Wofür bist du früher auf die Straße gegangen?", "Was denkst du, wenn du heute junge Menschen demonstrieren siehst?"]
                },
                {
                    q: "Welches prächtige Bauwerk in Hamburg wurde 2017 nach langer Bauzeit eröffnet und sieht aus wie eine gläserne Welle?",
                    h1: "Es steht direkt an der Elbe.",
                    h2: "Man nennt sie kurz die 'Elphi'.",
                    h3: "Es ist ein Konzerthaus.",
                    sol: "Die Elbphilharmonie",
                    reward: "Ganz genau! Ein klangvolles Ergebnis für einen Kenner wie dich.",
                    anecdote: "Die Kosten stiegen von 77 Millionen auf über 800 Millionen Euro. Aber die Akustik ist heute Weltklasse.",
                    joker: ["Bist du eher ein Fan von klassischer Musik oder darf es auch mal modern sein?", "Welches Bauwerk in deiner Heimat beeindruckt dich am meisten?"]
                }
            ],
            50: [
                {
                    q: "Im Jahr 2019 brannte eine weltberühmte Kathedrale in Paris. Die Bilder des brennenden Spitzturms gingen um die Welt. Welche war es?",
                    h1: "Sie liegt auf einer Insel in der Seine.",
                    h2: "Quasimodo ist der berühmte Glöckner aus der Literatur.",
                    h3: "Notre-D...",
                    sol: "Notre-Dame de Paris",
                    reward: "Richtig kombiniert! Dein Gedächtnis für große Momente ist fabelhaft.",
                    anecdote: "Ganz Frankreich spendete innerhalb weniger Tage fast eine Milliarde Euro für den Wiederaufbau.",
                    joker: ["Was war das schönste Gebäude, das du je auf Reisen gesehen hast?", "Glaubst du, dass alte Bauwerke eine Seele haben?"]
                }
            ],
            70: [
                {
                    q: "Wie heißt der britische Prinz, der im Jahr 2020 zusammen mit seiner Frau Meghan beschloss, seine königlichen Pflichten niederzulegen?",
                    h1: "Er ist der jüngere Bruder von Prinz William.",
                    h2: "Sein verstorbene Mutter war Prinzessin Diana.",
                    h3: "Prinz H...",
                    sol: "Prinz Harry",
                    reward: "Exzellent! Du bist im Adelshaus besser informiert als mancher Butler.",
                    anecdote: "Dieser Schritt wurde in den Medien als 'Megxit' bekannt – eine Anspielung auf den Brexit.",
                    joker: ["Hast du die Krönung oder große Hochzeiten im Fernsehen verfolgt?", "Was hältst du von dem Wunsch nach einem 'ganz normalen Leben'?"]
                }
            ],
            90: [
                {
                    q: "Welches Land trat am 31. Januar 2020 nach langen Verhandlungen offiziell aus der Europäischen Union aus?",
                    h1: "Es war der erste Austritt eines Mitgliedstaates überhaupt.",
                    h2: "Die Hauptstadt ist London.",
                    h3: "Großbritannien (oder Vereinigtes Königreich)",
                    sol: "Großbritannien / Brexit",
                    reward: "Ein meisterhaftes Wissen! Politische Zeitgeschichte ist bei dir in den besten Händen.",
                    anecdote: "Die Abstimmung zum Austritt fand bereits 2016 statt, doch die Verhandlungen dauerten fast vier Jahre.",
                    joker: ["Warst du schon einmal auf der Insel? Was schätzt du an der britischen Art?", "Wie wichtig ist dir ein vereintes Europa?"]
                }
            ]
        };

        // --- SPIEL LOGIK ---
        let currentLevel = 35;
        let selectedQuestions = [];
        let currentIndex = 0;
        let barometerScore = 0;

        function startGame(level) {
            currentLevel = level;
            const pool = questionPool[level];
            // Zufällige Auswahl (max 12 oder Pool-Größe)
            selectedQuestions = [...pool].sort(() => 0.5 - Math.random()).slice(0, 12);
            currentIndex = 0;
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('barometer-container').classList.remove('hidden');
            
            showQuestion();
            playTone(440, 'sine', 0.2);
        }

        function showQuestion() {
            const q = selectedQuestions[currentIndex];
            document.getElementById('progress').innerText = `Frage ${currentIndex + 1} von ${selectedQuestions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('hint-1-text').innerText = q.h1;
            document.getElementById('hint-2-text').innerText = q.h2;
            document.getElementById('hint-3-text').innerText = q.h3;
            
            document.getElementById('hint-extra').classList.add('hidden');
            document.getElementById('result-area').classList.remove('visible');
            document.getElementById('btn-more-hints').style.display = 'inline-block';
            document.getElementById('btn-success').style.display = 'inline-block';
        }

        function revealMoreHints() {
            document.getElementById('hint-extra').classList.add('visible');
            playTone(330, 'triangle', 0.1);
        }

        function showResult(isSuccess) {
            const q = selectedQuestions[currentIndex];
            const area = document.getElementById('result-area');
            area.classList.add('visible');
            
            document.getElementById('reward-title').innerText = isSuccess ? "Bravo!" : "Interessant, oder?";
            document.getElementById('solution-text').innerText = `Lösung: ${q.sol}`;
            document.getElementById('reward-title').style.color = isSuccess ? "var(--success-color)" : "var(--accent-color)";
            
            // Belohnende Antwort (auch bei Misserfolg würdevoll)
            const feedback = isSuccess ? q.reward : "Das war eine knifflige Frage. Aber genau das macht das Quizzen ja aus – man lernt immer wieder eine neue Facette unserer Zeit kennen.";
            document.getElementById('solution-text').innerHTML += `<br><span style="font-size: 1.2rem; font-weight: normal; font-style: italic;">${feedback}</span>`;
            
            document.getElementById('anecdote-text').innerText = q.anecdote;
            
            // Erzähl-Joker
            const jokerList = document.getElementById('joker-list');
            jokerList.innerHTML = q.joker.map(j => `<li>${j}</li>`).join('');

            document.getElementById('btn-more-hints').style.display = 'none';
            document.getElementById('btn-success').style.display = 'none';
            
            if(isSuccess) playTone(523, 'sine', 0.4); else playTone(220, 'sine', 0.3);
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex < selectedQuestions.length) {
                showQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-stats').innerText = `Wir haben gemeinsam 12 spannende Themen besprochen. Dein Wissens-Barometer steht heute auf: ${barometerScore}`;
            playTone(660, 'sine', 0.5);
        }

        function changeBaro(val) {
            barometerScore += val;
            document.getElementById('baro-val').innerText = barometerScore;
            playTone(val > 0 ? 880 : 110, 'sine', 0.1);
        }
    </script>
</body>
</html>
